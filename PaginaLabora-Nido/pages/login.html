<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../imagenes/favicon.svg" /> 
  <title>Iniciar sesión · Labora-e</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- BREADCRUMB -->
  <nav class="breadcrumb-nav" aria-label="breadcrumb">
    <div class="container-xl px-4">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="../index.html">Inicio</a></li><li class="breadcrumb-item active" aria-current="page">Iniciar sesión</li>
      </ol>
    </div>
  </nav>
  <div class="page-split">

    <div class="page-split__left">
      <div class="split-icon">📅</div>
      <h2>¡Bienvenido!</h2>
      <p>Inicia sesión para continuar gestionando tu jornada laboral.</p>
      <div class="split-brand">
        <strong>Nido I+D+i</strong><br/>Tecnología para el bien común
      </div>
    </div>

    <div class="page-split__right">
      <a href="../inicio.html" class="back-link">← Volver al inicio</a>
      <div class="auth-box">
        <h1>Iniciar sesión</h1>
        <p class="auth-sub">Inicia sesión para continuar</p>

        <div class="auth-field">
          <label for="email">Correo electrónico</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">✉️</span>
            <input type="email" id="email" placeholder="tu@email.com" />
          </div>
          <span class="recuperar-error" id="error-email"></span>
        </div>

        <div class="auth-field">
          <label for="password">Contraseña</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">🔒</span>
            <input type="password" id="password" placeholder="Tu contraseña" />
            <button class="auth-input-toggle" onclick="togglePassword(this)" type="button">👁</button>
          </div>
          <span class="recuperar-error" id="error-password"></span>
        </div>

        <div class="text-end mb-4">
          <a href="recuperar.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <span class="recuperar-error mb-3" id="error-general"></span>
        <button onclick="iniciarSesion()" class="btn btn-teal btn-xl w-100">Iniciar Sesión →</button>

        <p class="auth-footer mt-4">
          ¿No tienes cuenta? <a href="register.html">Crear cuenta</a>
        </p>
      </div>
    </div>

  </div>

  <script>
    // Redirigir si ya está logueado
    if (localStorage.getItem('user_loggedin') === 'true') {
      window.location.href = '../index.html';
    }

    const temaGuardado = localStorage.getItem('user_tema') || 'light';
    if (temaGuardado === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    function togglePassword(btn) {
      const input = btn.closest('.auth-input-wrap').querySelector('input');
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function mostrarError(id, msg) {
      const el = document.getElementById(id);
      if (el) el.textContent = msg;
    }

    function limpiarErrores() {
      ['error-email','error-password','error-general'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = '';
      });
      document.querySelectorAll('.auth-input-wrap').forEach(el => el.classList.remove('input-error'));
    }

    function iniciarSesion() {
      limpiarErrores();
      const emailInput    = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const email         = emailInput.value.trim();
      const password      = passwordInput.value;
      let valid = true;

      if (!email) {
        mostrarError('error-email', 'Introduce tu correo electrónico.');
        emailInput.closest('.auth-input-wrap').classList.add('input-error');
        valid = false;
      }
      if (!password) {
        mostrarError('error-password', 'Introduce tu contraseña.');
        passwordInput.closest('.auth-input-wrap').classList.add('input-error');
        valid = false;
      }
      if (!valid) return;

      const savedEmail    = localStorage.getItem('user_email');
      const savedPassword = localStorage.getItem('user_password');

      if (!savedEmail || !savedPassword) {
        mostrarError('error-general', 'No existe ninguna cuenta registrada. Crea una cuenta primero.');
        return;
      }
      if (email !== savedEmail || password !== savedPassword) {
        mostrarError('error-general', 'El correo electrónico o la contraseña no son correctos.');
        emailInput.closest('.auth-input-wrap').classList.add('input-error');
        passwordInput.closest('.auth-input-wrap').classList.add('input-error');
        return;
      }

      localStorage.setItem('user_loggedin', 'true');
      window.location.href = '../index.html';
    }
  </script>
</body>
</html>
