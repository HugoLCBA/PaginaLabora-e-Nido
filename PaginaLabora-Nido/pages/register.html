<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../imagenes/favicon.svg" />
  <title>Crear cuenta · Labora-e</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- BREADCRUMB -->
  <nav class="breadcrumb-nav" aria-label="breadcrumb">
    <div class="container-xl px-4">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="../index.html">Inicio</a></li><li class="breadcrumb-item active" aria-current="page">Crear cuenta</li>
      </ol>
    </div>
  </nav>
  <div class="page-split">

    <div class="page-split__left">
      <div class="split-icon">🚀</div>
      <h2>Empieza gratis</h2>
      <p>Crea tu cuenta y organiza a tu equipo en menos de 2 minutos. Sin tarjeta de crédito.</p>
      <div class="split-brand">
        <strong>Nido I+D+i</strong><br/>Tecnología para el bien común
      </div>
    </div>

    <div class="page-split__right">
      <a href="../inicio.html" class="back-link">← Volver al inicio</a>
      <div class="auth-box">
        <h1>Crear cuenta</h1>
        <p class="auth-sub">Únete a Labora-e hoy mismo</p>

        <div class="auth-field">
          <label for="nombre">Nombre completo</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">👤</span>
            <input type="text" id="nombre" placeholder="Tu nombre completo" />
          </div>
          <span class="recuperar-error" id="error-nombre"></span>
        </div>

        <div class="auth-field">
          <label for="email">Correo electrónico</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">✉️</span>
            <input type="email" id="email" placeholder="tu@email.com" />
          </div>
          <span class="recuperar-error" id="error-email"></span>
        </div>

        <div class="auth-field">
          <label for="empresa">Empresa (opcional)</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">🏢</span>
            <input type="text" id="empresa" placeholder="Nombre de tu empresa" />
          </div>
        </div>

        <div class="auth-field">
          <label for="password">Contraseña</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">🔒</span>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
            <button class="auth-input-toggle" onclick="togglePassword(this)" type="button">👁</button>
          </div>
          <span class="recuperar-error" id="error-password"></span>
        </div>

        <button onclick="irAPlanes()" class="btn btn-teal btn-xl w-100 mt-2">
          Continuar → Elegir plan
        </button>

        <p class="auth-footer mt-4">
          ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
        </p>
      </div>
    </div>

  </div>

  <script>
    // Redirigir si ya está logueado
    if (localStorage.getItem('user_loggedin') === 'true') {
      window.location.href = '../index.html';
    }

    const temaGuardado = localStorage.getItem('user_tema') || 'light';
    if (temaGuardado === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    function togglePassword(btn) {
      const input = btn.closest('.auth-input-wrap').querySelector('input');
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function irAPlanes() {
      // Limpiar errores previos
      ['error-nombre','error-email','error-password'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = '';
      });
      document.querySelectorAll('.auth-input-wrap').forEach(el => el.classList.remove('input-error'));

      const nombreInput   = document.getElementById('nombre');
      const emailInput    = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const nombre        = nombreInput.value.trim();
      const email         = emailInput.value.trim();
      const password      = passwordInput.value;
      let valid = true;

      if (!nombre) {
        document.getElementById('error-nombre').textContent = 'Por favor introduce tu nombre.';
        nombreInput.closest('.auth-input-wrap').classList.add('input-error');
        valid = false;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('error-email').textContent = 'Introduce un correo electrónico válido.';
        emailInput.closest('.auth-input-wrap').classList.add('input-error');
        valid = false;
      }
      if (password.length < 8) {
        document.getElementById('error-password').textContent = 'La contraseña debe tener al menos 8 caracteres.';
        passwordInput.closest('.auth-input-wrap').classList.add('input-error');
        valid = false;
      }
      if (!valid) return;

      localStorage.setItem('user_nombre',   nombre);
      localStorage.setItem('user_email',    email);
      localStorage.setItem('user_password', password);
      localStorage.setItem('user_empresa',  document.getElementById('empresa').value.trim());
      window.location.href = 'planes.html';
    }
  </script>
</body>
</html>
