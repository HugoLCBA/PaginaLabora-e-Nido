<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../imagenes/favicon.svg" />
  <title>Crear cuenta · Labora-e</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- BREADCRUMB -->
  <nav class="breadcrumb-nav" aria-label="breadcrumb">
    <div class="container-xl px-4">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="../index.html">Inicio</a></li><li class="breadcrumb-item active" aria-current="page">Crear cuenta</li>
      </ol>
    </div>
  </nav>
  <div class="page-split">

    <div class="page-split__left">
      <div class="split-icon">🚀</div>
      <h2>Empieza gratis</h2>
      <p>Crea tu cuenta y organiza a tu equipo en menos de 2 minutos. Sin tarjeta de crédito.</p>
      <div class="split-brand">
        <strong>Nido I+D+i</strong><br/>Tecnología para el bien común
      </div>
    </div>

    <div class="page-split__right">
      <a href="../inicio.html" class="back-link">← Volver al inicio</a>
      <div class="auth-box">
        <h1>Crear cuenta</h1>
        <p class="auth-sub">Únete a Labora-e hoy mismo</p>

        <div class="auth-field">
          <label for="nombre">Nombre completo</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">👤</span>
            <input type="text" id="nombre" placeholder="Tu nombre completo" />
          </div>
        </div>

        <div class="auth-field">
          <label for="email">Correo electrónico</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">✉️</span>
            <input type="email" id="email" placeholder="tu@email.com" />
          </div>
        </div>

        <div class="auth-field">
          <label for="empresa">Empresa (opcional)</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">🏢</span>
            <input type="text" id="empresa" placeholder="Nombre de tu empresa" />
          </div>
        </div>

        <div class="auth-field">
          <label for="password">Contraseña</label>
          <div class="auth-input-wrap">
            <span class="auth-input-icon">🔒</span>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
            <button class="auth-input-toggle" onclick="togglePassword(this)" type="button">👁</button>
          </div>
        </div>

        <button onclick="irAPlanes()" class="btn btn-teal btn-xl w-100 mt-2">
          Continuar → Elegir plan
        </button>

        <p class="auth-footer mt-4">
          ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
        </p>
      </div>
    </div>

  </div>

  <script>
    function togglePassword(btn) {
      const input = btn.closest('.auth-input-wrap').querySelector('input');
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁' : '🙈';
    }

    function irAPlanes() {
      const nombre   = document.getElementById('nombre').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!nombre || !email) {
        alert('Por favor rellena tu nombre y correo electrónico.');
        return;
      }
      if (password.length < 8) {
        alert('La contraseña debe tener al menos 8 caracteres.');
        return;
      }
      localStorage.setItem('user_nombre',   nombre);
      localStorage.setItem('user_email',    email);
      localStorage.setItem('user_password', password);
      localStorage.setItem('user_empresa',  document.getElementById('empresa').value.trim());
      window.location.href = 'planes.html';
    }
  </script>
</body>
</html>
